<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />

<meta http-equiv="Content-Security-Policy" content="
default-src 'self' https:;
script-src 'self' 'unsafe-inline' 'unsafe-eval' https://appsforoffice.microsoft.com https:;
style-src 'self' 'unsafe-inline' https:;
img-src 'self' data: https:;
connect-src 'self' https: http://localhost:8000 https://phishbuster-backend-z1a7.onrender.com;
">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PhishBuster</title>

<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

<link rel="stylesheet" href="taskpane.css?v=5">
</head>

<body>

<!-- 🔥 HEADER -->
<header class="header">
    <div class="header-inner">
        <img src="../assets/icon-80.png" class="logo"/>
        <h2>PhishBuster</h2>
    </div>
</header>

<!-- 🔥 DASHBOARD -->
<div class="card dashboard fade-in">
    <div class="metric phishing">
        <h3 id="phishingCount">0</h3>
        <p>Phishing</p>
    </div>
    <div class="metric suspicious">
        <h3 id="suspiciousCount">0</h3>
        <p>Suspicious</p>
    </div>
</div>

<!-- 🔥 MAIN ANALYSIS -->
<div class="card fade-in">

    <div class="section-header">
        <h4>Current Email</h4>
        <span id="statusBadge" class="badge">Checking...</span>
    </div>

    <!-- Risk Meter -->
    <div class="risk-container">
        <div class="risk-bar">
            <div id="riskFill"></div>
        </div>
        <div id="riskLabel"></div>
    </div>

    <p id="confidenceText" class="subtle"></p>

    <span id="originBadge" class="origin-badge"></span>

</div>

<!-- 🔥 FLOW VISUAL -->
<div id="actionFlow" class="card flow-card fade-in">
    <h4>Automated Action</h4>
    <p id="flowText"></p>
</div>

<!-- 🔥 INSIGHT -->
<div class="card fade-in">
    <h4>Security Insight</h4>
    <p id="analysisMessage"></p>
</div>

<!-- 🔥 DETAILS -->
<div class="card fade-in">
    <h4>Details</h4>
    <div class="detail-item">
        <span>Links</span>
        <p id="links"></p>
    </div>
    <div class="detail-item">
        <span>Suspicious Words</span>
        <p id="words"></p>
    </div>
</div>

<!-- 🔥 ACTION -->
<div class="card fade-in">
    <button id="reportBtn" class="btn-primary">
        🚨 Report to Admin
    </button>
</div>

<script src="taskpane.js?v=5"></script>

</body>
</html>
